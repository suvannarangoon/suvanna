<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog — Suvanna Rangoon</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Open Sans', sans-serif; background: #fff; color: #222; overflow-x: hidden; }

  nav {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    height: 52px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .nav-inner { width: 100%; max-width: 900px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 100%; }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-logo img { height: 16px; width: auto; display: block; }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .burger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .burger span { display: block; width: 20px; height: 1.5px; background: #333; transition: all 0.3s ease; transform-origin: center; }
  .burger.open span:nth-child(1) { transform: translateY(3.25px) rotate(45deg); }
  .burger.open span:nth-child(2) { transform: translateY(-3.25px) rotate(-45deg); }

  .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .menu-overlay.open { opacity: 1; pointer-events: all; }
  .dropdown-menu { position: fixed; top: 0; right: 0; bottom: 0; width: 260px; background: #fff; z-index: 95; padding: 72px 28px 32px; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
  .dropdown-menu.open { transform: translateX(0); }
  .menu-item { display: block; padding: 13px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #222; cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; text-align: left; width: 100%; font-family: 'Open Sans', sans-serif; transition: color 0.2s; }
  .menu-item:hover { color: #888; }

  /* PAGE */
  .page-wrap { margin-top: 52px; padding-bottom: 60px; }

  /* FILTER */
  .filter-wrap { padding: 20px 16px 4px; max-width: 900px; margin: 0 auto; }
  .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 16px; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; border: 1px solid #e0e0e0; background: #fff; color: #555; padding: 7px 16px; font-family: 'Open Sans', sans-serif; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 999px; transition: all 0.2s; }
  .filter-btn:hover { border-color: #111; color: #111; }
  .filter-btn.active { background: #111; color: #fff; border-color: #111; }

  /* SECTION */
  .catalog-section { margin-bottom: 40px; }
  .section-header { display: flex; justify-content: space-between; align-items: baseline; padding: 0 16px; margin-bottom: 16px; max-width: 900px; margin-left: auto; margin-right: auto; }
  .section-title { font-size: 1rem; font-weight: 700; letter-spacing: 0; color: #111; }
  .section-count { font-size: 0.7rem; color: #bbb; }

  /* HORIZONTAL SCROLL */
  .h-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 0 16px 8px; scrollbar-width: none; }
  .h-scroll::-webkit-scrollbar { display: none; }

  /* PRODUCT CARD — horizontal scroll version */
  .product-card-h {
    flex-shrink: 0;
    width: 160px;
    cursor: pointer;
    position: relative;
  }
  .product-card-h:hover .product-img { transform: scale(1.03); }

  /* PRODUCT CARD — grid version */
  .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #f0f0f0; max-width: 900px; margin: 0 auto; }
  @media (min-width: 600px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }
  .product-card-g { background: #fff; cursor: pointer; position: relative; }
  .product-card-g:hover .product-img { transform: scale(1.03); }

  /* IMG */
  .product-img-wrap-h { overflow: hidden; aspect-ratio: 3/4; background: #f9f9f9; position: relative; border-radius: 8px; }
  .product-img-wrap-g { overflow: hidden; aspect-ratio: 3/4; background: #f9f9f9; position: relative; }
  .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

  /* BADGES */
  .badge-wrap { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; z-index: 1; flex-wrap: wrap; }
  .badge { font-size: 0.55rem; letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px; font-weight: 600; }
  .badge-new { background: #111; color: #fff; }
  .badge-lowstock { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
  .badge-outofstock { background: #f8d7da; color: #721c24; }

  /* PRODUCT INFO */
  .product-info-h { padding: 10px 4px 0; }
  .product-info-g { padding: 12px 14px 16px; }

  .product-inspired { font-family: 'Courier New', monospace; font-size: 0.65rem; color: #aaa; margin-bottom: 2px; letter-spacing: 0; }
  .product-brand-h { font-size: 0.65rem; color: #888; margin-bottom: 2px; letter-spacing: 0; }
  .product-name-h { font-size: 0.8rem; font-weight: 700; color: #111; margin-bottom: 4px; letter-spacing: 0; line-height: 1.2; }
  .product-brand-g { font-size: 0.65rem; color: #888; margin-bottom: 2px; letter-spacing: 0; }
  .product-name-g { font-size: 0.85rem; font-weight: 700; color: #111; margin-bottom: 4px; letter-spacing: 0; line-height: 1.3; }
  .product-vol-price { font-size: 0.75rem; color: #555; letter-spacing: 0; }
  .product-price { font-weight: 600; color: #111; }
  .product-sold { font-size: 0.6rem; color: #bbb; margin-top: 2px; }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: #bbb; font-size: 0.85rem; }

  /* DETAIL PAGE */
  .detail-page { display: none; position: fixed; inset: 0; background: #fff; z-index: 150; overflow-y: auto; }
  .detail-page.open { display: block; }
  .detail-nav { height: 52px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 10; }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; color: #555; padding: 0; }
  .back-btn:hover { color: #111; }
  .detail-content { max-width: 600px; margin: 0 auto; padding: 0 0 80px; }
  .detail-img-wrap { aspect-ratio: 1; background: #f9f9f9; overflow: hidden; }
  .detail-img { width: 100%; height: 100%; object-fit: cover; }
  .detail-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
  .detail-info { padding: 24px 20px; }
  .detail-badges { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .detail-inspired { font-family: 'Courier New', monospace; font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
  .detail-brand { font-size: 0.85rem; color: #888; margin-bottom: 4px; }
  .detail-name { font-size: 1.5rem; font-weight: 700; color: #111; margin-bottom: 16px; letter-spacing: 0; line-height: 1.2; }
  .detail-label { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: #bbb; margin-bottom: 6px; margin-top: 16px; }
  .detail-notes { font-size: 0.85rem; color: #555; letter-spacing: 0; }
  .volume-row { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .vol-btn { border: 1px solid #e0e0e0; background: #fff; padding: 8px 16px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
  .vol-btn.active { border-color: #111; background: #111; color: #fff; }
  .detail-price { font-size: 1.4rem; font-weight: 700; color: #111; margin-top: 16px; }
  .detail-sold { font-size: 0.75rem; color: #bbb; margin-top: 4px; }
  .stock-instock { color: #2e7d32; font-size: 0.75rem; margin-top: 4px; }
  .stock-low { color: #f57f17; font-size: 0.75rem; margin-top: 4px; }
  .stock-out { color: #c62828; font-size: 0.75rem; margin-top: 4px; }
  .detail-desc { font-size: 0.9rem; color: #555; line-height: 1.8; margin-top: 6px; letter-spacing: 0; }
  .read-more-btn { background: none; border: none; color: #111; font-family: 'Open Sans', sans-serif; font-size: 0.8rem; cursor: pointer; text-decoration: underline; margin-top: 6px; padding: 0; }
  .add-to-bag-btn { width: 100%; background: #111; color: #fff; border: none; padding: 16px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 6px; margin-top: 20px; }
  .add-to-bag-btn:hover { background: #333; }

  /* FOOTER */
  footer { background: #000; padding: 40px 0 32px; }
  .footer-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  .footer-brand { font-size: 1.3rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; text-align: center; margin-bottom: 36px; }
  .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 36px; }
  @media (min-width: 600px) { .footer-grid { grid-template-columns: repeat(4, 1fr); } }
  .footer-col-title { font-size: 0.65rem; font-weight: 600; color: #fff; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
  .footer-link { display: block; font-size: 0.8rem; color: #888; text-decoration: none; margin-bottom: 8px; }
  .footer-link:hover { color: #fff; }
  .footer-social { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
  .social-icon { background: none; border: none; cursor: pointer; color: #666; display: flex; align-items: center; transition: color 0.2s; padding: 4px; }
  .social-icon:hover { color: #fff; }
  .footer-bottom { text-align: center; font-size: 0.72rem; color: #555; border-top: 1px solid #222; padding-top: 20px; }
</style>
</head>
<body>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="dropdown-menu" id="dropdownMenu">
  <button class="menu-item" onclick="window.location.href='../home'">Home</button>
  <button class="menu-item">A Moment</button>
  <button class="menu-item">Shop</button>
  <button class="menu-item">Store</button>
  <button class="menu-item" onclick="window.location.href='../about'">About</button>
  <button class="menu-item" onclick="window.location.href='../contact'">Contact</button>
</div>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="https://suvannarangoon.github.io/suvanna/home">
      <img src="../home/logo.PNG" alt="Suvanna">
    </a>
    <div class="nav-right">
      <button class="burger" id="burgerBtn" onclick="toggleMenu()">
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</nav>

<div class="page-wrap" id="catalogPage">

  <div class="filter-wrap">
    <div class="filter-scroll">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('men',this)">Men</button>
      <button class="filter-btn" onclick="setFilter('women',this)">Women</button>
      <button class="filter-btn" onclick="setFilter('unisex',this)">Unisex</button>
      <button class="filter-btn" onclick="setFilter('new',this)">New</button>
      <button class="filter-btn" onclick="setFilter('featured',this)">Featured</button>
      <button class="filter-btn" onclick="setFilter('inspired',this)">Inspired</button>
      <button class="filter-btn" onclick="setFilter('suvanna',this)">Suvanna</button>
    </div>
  </div>

  <div id="sectionsWrap"></div>

</div>

<!-- DETAIL PAGE -->
<div class="detail-page" id="detailPage">
  <div class="detail-nav">
    <button class="back-btn" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>

      Back

  <div class="detail-content" id="detailContent"></div>
</div>

    <div class="footer-grid">
      <div>
        <div class="footer-col-title">Products</div>
        <a class="footer-link" href="#">Catalog</a>
        <a class="footer-link" href="#">Shop</a>
      </div>
      <div>
        <div class="footer-col-title">Suvanna Store</div>
        <a class="footer-link" href="#">Find a Store</a>
        <a class="footer-link" href="#">Online Store</a>
      </div>
      <div>
        <div class="footer-col-title">Customer Care</div>
        <a class="footer-link" href="#">Returns</a>
        <a class="footer-link" href="#">Delivery</a>
        <a class="footer-link" href="#">Shipping</a>
        <a class="footer-link" href="#">Contact Us</a>

      <div>
        <div class="footer-col-title">About Suvanna</div>
        <a class="footer-link" href="#">About Us</a>

      </button>
      <button class="social-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>
      </button>
      <button class="social-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.17 8.17 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg>
      </button>
    </div>
    <div class="footer-bottom">© 2026 Suvanna Rangoon. All rights reserved.</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzmyuThMPBFMVrDqFp1QHneRzngPBhQsc_rOF2QHZBdfVBefv7fnVPduwE6arS0mSQj/exec";

let allProducts = [];
let selectedVolumes = {};
let currentFilter = 'all';

function groupByID(products) {
  const map = {};
  products.forEach(p => {
    if (!map[p.id]) map[p.id] = { ...p, volumes: [] };
    map[p.id].volumes.push({
      volume: p.volume,
      price: p.price,
      inStock: p.inStock,
      sold: p.sold,
      stockStatus: p.stockStatus
    });
  });
  return Object.values(map);
}

function getBottleSVG(size = 48) {
  return `<svg width="${size}" height="${Math.round(size*1.5)}" viewBox="0 0 48 72" fill="none">
    <rect x="16" y="2" width="16" height="18" rx="4" stroke="#ddd" stroke-width="1.5" fill="none"/>
    <rect x="3" y="24" width="42" height="44" rx="8" stroke="#ddd" stroke-width="1.5" fill="none"/>
  </svg>`;
}

function getStockBadge(s) {
  if (s === 'Out of Stock') return '<span class="badge badge-outofstock">Out of Stock</span>';
  if (s === 'Low Stock') return '<span class="badge badge-lowstock">Low Stock</span>';
  return '';
}

function cardHTML(p, mode) {
  const vol = p.volumes[0];
  const imgSrc = p.image ? `../catalog/images/${p.image}` : null;
  const newBadge = p.status === 'New' ? '<span class="badge badge-new">New</span>' : '';
  const stockBadge = getStockBadge(vol.stockStatus);
  const inspiredLine = p.type === 'Inspired'
    ? `<div class="product-inspired">inspired by</div>`
    : `<div class="product-inspired">suvanna original</div>`;

  if (mode === 'h') {
    return `
      <div class="product-card-h" onclick="openDetail('${p.id}')">
        <div class="product-img-wrap-h">
          <div class="badge-wrap">${newBadge}${stockBadge}</div>
          ${imgSrc
            ? `<img class="product-img" src="${imgSrc}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-img-placeholder\\'>${getBottleSVG(40)}</div>'">`
            : `<div class="product-img-placeholder">${getBottleSVG(40)}</div>`}
        </div>
        <div class="product-info-h">
          ${inspiredLine}
          <div class="product-brand-h">${p.brand}</div>
          <div class="product-name-h">${p.name}</div>
          <div class="product-vol-price">
            <span class="product-price">${Number(vol.price).toLocaleString()} Ks</span>
          </div>
          ${vol.sold > 0 ? `<div class="product-sold">${vol.sold} sold</div>` : ''}
        </div>
      </div>`;
  } else {
    return `
      <div class="product-card-g" onclick="openDetail('${p.id}')">
        <div class="product-img-wrap-g">
          <div class="badge-wrap">${newBadge}${stockBadge}</div>
          ${imgSrc
            ? `<img class="product-img" src="${imgSrc}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-img-placeholder\\'>${getBottleSVG(48)}</div>'">`
            : `<div class="product-img-placeholder">${getBottleSVG(48)}</div>`}
        </div>
        <div class="product-info-g">
          ${inspiredLine}
          <div class="product-brand-g">${p.brand}</div>
          <div class="product-name-g">${p.name}</div>
          <div class="product-vol-price">
            ${p.volumes.map(v => v.volume).join(' · ')} &nbsp;
            <span class="product-price">${Number(vol.price).toLocaleString()} Ks</span>
          </div>
          ${vol.sold > 0 ? `<div class="product-sold">${vol.sold} sold</div>` : ''}
        </div>
      </div>`;
  }
}

function renderSections(products) {
  const grouped = groupByID(products);
  const wrap = document.getElementById('sectionsWrap');

  const sections = [
    { key: 'new', title: 'New Arrivals', filter: p => p.status === 'New' },
    { key: 'featured', title: 'Featured', filter: p => p.featured === 'Yes' },
    { key: 'all', title: 'All Products', filter: () => true },
  ];

  wrap.innerHTML = sections.map(sec => {
    const items = grouped.filter(sec.filter);
    if (items.length === 0) return '';

    const isGrid = sec.key === 'all';

    return `
      <div class="catalog-section">
        <div class="section-header">
          <div class="section-title">${sec.title}</div>
          <div class="section-count">${items.length} items</div>
        </div>
        ${isGrid
          ? `<div class="catalog-grid">${items.map(p => cardHTML(p, 'g')).join('')}</div>`
          : `<div class="h-scroll">${items.map(p => cardHTML(p, 'h')).join('')}</div>`
        }
      </div>`;
  }).join('');
}

function applyFilter(products) {
  if (currentFilter === 'all') return products;
  if (currentFilter === 'men') return products.filter(p => p.category === 'Men');
  if (currentFilter === 'women') return products.filter(p => p.category === 'Women');
  if (currentFilter === 'unisex') return products.filter(p => p.category === 'Unisex');
  if (currentFilter === 'new') return products.filter(p => p.status === 'New');
  if (currentFilter === 'featured') return products.filter(p => p.featured === 'Yes');
  if (currentFilter === 'inspired') return products.filter(p => p.type === 'Inspired');
  if (currentFilter === 'suvanna') return products.filter(p => p.type === 'Suvanna');
  return products;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSections(applyFilter(allProducts));
}

function openDetail(id) {
  const grouped = groupByID(allProducts);
  const p = grouped.find(x => x.id === id);
  if (!p) return;
  selectedVolumes[id] = 0;
  renderDetail(p);
  document.getElementById('detailPage').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderDetail(p) {
  const idx = selectedVolumes[p.id] || 0;
  const vol = p.volumes[idx];
  const imgSrc = p.image ? `../catalog/images/${p.image}` : null;
  const isOut = vol.stockStatus === 'Out of Stock';
  const stockClass = isOut ? 'stock-out' : vol.stockStatus === 'Low Stock' ? 'stock-low' : 'stock-instock';
  const desc = p.description || '';
  const shortDesc = desc.length > 150 ? desc.substring(0, 150) + '...' : desc;
  const hasMore = desc.length > 150;

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-img-wrap">
      ${imgSrc
        ? `<img class="detail-img" src="${imgSrc}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'detail-img-placeholder\\'>${getBottleSVG(64)}</div>'">`
        : `<div class="detail-img-placeholder">${getBottleSVG(64)}</div>`}
    </div>
    <div class="detail-info">
      <div class="detail-badges">
        ${p.status === 'New' ? '<span class="badge badge-new">New</span>' : ''}
        ${getStockBadge(vol.stockStatus)}
      </div>
      <div class="detail-inspired">${p.type === 'Inspired' ? 'inspired by' : 'suvanna original'}</div>
      <div class="detail-brand">${p.brand}</div>
      <div class="detail-name">${p.name}</div>

      ${p.notes ? `<div class="detail-label">Scent Notes</div><div class="detail-notes">${p.notes}</div>` : ''}

      <div class="detail-label">Volume</div>
      <div class="volume-row">
        ${p.volumes.map((v, i) => `
          <button class="vol-btn ${i === idx ? 'active' : ''}" onclick="selectVolume('${p.id}', ${i})">${v.volume}</button>
        `).join('')}
      </div>

      <div class="detail-price">${Number(vol.price).toLocaleString()} Ks</div>
      ${vol.sold > 0 ? `<div class="detail-sold">${vol.sold} sold</div>` : ''}
      <div class="${stockClass}">${vol.stockStatus}</div>

      ${desc ? `
        <div class="detail-label">Description</div>
        <div class="detail-desc" id="detailDesc">${shortDesc}</div>
        ${hasMore ? `<button class="read-more-btn" onclick="toggleDesc()">Read more</button>` : ''}
      ` : ''}

      ${!isOut ? `<button class="add-to-bag-btn">Add to Bag</button>` : ''}
    </div>`;

  window._fullDesc = desc;
  window._shortDesc = shortDesc;
  window._descExpanded = false;
}

function selectVolume(id, idx) {
  selectedVolumes[id] = idx;
  const grouped = groupByID(allProducts);
  const p = grouped.find(x => x.id === id);
  if (p) renderDetail(p);
}

function toggleDesc() {
  const el = document.getElementById('detailDesc');
  const btn = document.querySelector('.read-more-btn');
  if (!window._descExpanded) {
    el.textContent = window._fullDesc;
    btn.textContent = 'Read less';
    window._descExpanded = true;
  } else {
    el.textContent = window._shortDesc;
    btn.textContent = 'Read more';
    window._descExpanded = false;
  }
}

function closeDetail() {
  document.getElementById('detailPage').classList.remove('open');
  document.body.style.overflow = '';
}

async function loadProducts() {
  document.getElementById('sectionsWrap').innerHTML =
    '<div class="loading">Products ဖတ်နေသည်...</div>';
  try {
    const res = await fetch(SHEET_URL);
    const data = await res.json();
    if (data.success && data.products) {
      allProducts = data.products;
      renderSections(allProducts);
    }
  } catch (err) {
    document.getElementById('sectionsWrap').innerHTML =
      '<div class="loading">ချိတ်ဆက်မရပါ၊ ထပ်ကြိုးစားပါ</div>';
  }
}

function toggleMenu() {
  document.getElementById('burgerBtn').classList.toggle('open');
  document.getElementById('dropdownMenu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
}

loadProducts();
</script>
</body>
</html>
