<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog — Suvanna Rangoon</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Open Sans', sans-serif; background: #fff; color: #222; overflow-x: hidden; }

  nav {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    height: 52px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .nav-inner { width: 100%; max-width: 900px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 100%; }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-logo img { height: 16px; width: auto; display: block; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-icon-btn { background: none; border: none; cursor: pointer; color: #333; display: flex; align-items: center; padding: 4px; position: relative; }
  .cart-badge { position: absolute; top: -4px; right: -4px; background: #111; color: #fff; width: 15px; height: 15px; border-radius: 50%; font-size: 0.55rem; display: none; align-items: center; justify-content: center; font-weight: 700; }
  .cart-badge.show { display: flex; }
  .burger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .burger span { display: block; width: 20px; height: 1.5px; background: #333; transition: all 0.3s ease; transform-origin: center; }
  .burger.open span:nth-child(1) { transform: translateY(3.25px) rotate(45deg); }
  .burger.open span:nth-child(2) { transform: translateY(-3.25px) rotate(-45deg); }

  .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .menu-overlay.open { opacity: 1; pointer-events: all; }
  .dropdown-menu { position: fixed; top: 0; right: 0; bottom: 0; width: 260px; background: #fff; z-index: 95; padding: 72px 28px 32px; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
  .dropdown-menu.open { transform: translateX(0); }
  .menu-item { display: block; padding: 13px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #222; cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; text-align: left; width: 100%; font-family: 'Open Sans', sans-serif; transition: color 0.2s; }
  .menu-item:hover { color: #888; }

  /* BAG PANEL */
  .bag-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .bag-overlay.open { opacity: 1; pointer-events: all; }
  .bag-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 320px; max-width: 90vw; background: #fff; z-index: 201; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
  .bag-panel.open { transform: translateX(0); }
  .bag-header { padding: 20px 20px 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
  .bag-title { font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .bag-close { background: none; border: none; cursor: pointer; color: #888; font-size: 1.2rem; padding: 4px; }
  .bag-close:hover { color: #111; }
  .bag-items { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .bag-empty { text-align: center; padding: 40px 0; color: #ccc; font-size: 0.82rem; }
  .bag-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f5f5f5; align-items: center; }
  .bag-item-img { width: 52px; height: 52px; object-fit: contain; background: #f9f9f9; border-radius: 4px; flex-shrink: 0; }
  .bag-item-img-placeholder { width: 52px; height: 52px; background: #f5f5f5; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .bag-item-info { flex: 1; min-width: 0; }
  .bag-item-name { font-size: 0.78rem; font-weight: 600; color: #111; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bag-item-vol { font-size: 0.65rem; color: #aaa; margin-bottom: 4px; }
  .bag-item-price { font-size: 0.78rem; font-weight: 600; color: #111; }
  .bag-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .qty-row { display: flex; align-items: center; gap: 6px; }
  .qty-btn { background: none; border: 1px solid #e0e0e0; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; color: #333; }
  .qty-btn:hover { border-color: #111; }
  .qty-num { font-size: 0.78rem; font-weight: 600; min-width: 16px; text-align: center; }
  .bag-item-remove { background: none; border: none; cursor: pointer; color: #ccc; font-size: 0.7rem; }
  .bag-item-remove:hover { color: #e53935; }
  .bag-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; }
  .bag-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .bag-total-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .bag-total-amt { font-size: 1rem; font-weight: 700; color: #111; }
  .bag-checkout-btn { width: 100%; background: #111; color: #fff; border: none; padding: 14px; font-family: 'Open Sans', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 7px; }
  .bag-checkout-btn:hover { background: #333; }

  /* VOLUME POPUP */
  .vol-popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s; display: flex; align-items: flex-end; justify-content: center; }
  .vol-popup-overlay.open { opacity: 1; pointer-events: all; }
  .vol-popup { background: #fff; width: 100%; max-width: 480px; border-radius: 16px 16px 0 0; padding: 28px 24px 32px; transform: translateY(100%); transition: transform 0.3s ease; }
  .vol-popup-overlay.open .vol-popup { transform: translateY(0); }
  .vol-popup-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #111; margin-bottom: 4px; }
  .vol-popup-name { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

  /* BOTTLE ANIMATION */
  .bottle-anim-wrap { display: flex; justify-content: center; align-items: flex-end; gap: 32px; margin-bottom: 24px; height: 90px; }
  .bottle-slot { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
  .bottle-svg-wrap { transition: transform 0.2s; }
  .bottle-slot:hover .bottle-svg-wrap { transform: scale(1.08); }
  .bottle-slot.active .bottle-svg-wrap svg rect { stroke: #111; }
  .bottle-slot.inactive .bottle-svg-wrap svg rect { stroke: #ccc; }
  .bottle-label { font-size: 0.65rem; font-weight: 600; color: #999; letter-spacing: 1px; }
  .bottle-slot.active .bottle-label { color: #111; }
  .bottle-price { font-size: 0.75rem; font-weight: 700; color: #111; }
  .bottle-slot.inactive .bottle-price { color: #bbb; }

  @keyframes floatUp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .bottle-slot.active .bottle-svg-wrap { animation: floatUp 1.8s ease-in-out infinite; }

  .vol-options { display: flex; gap: 10px; margin-bottom: 20px; }
  .vol-opt-btn { flex: 1; border: 1.5px solid #e0e0e0; background: #fff; padding: 10px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; cursor: pointer; border-radius: 8px; transition: all 0.2s; text-align: center; }
  .vol-opt-btn.selected { border-color: #111; background: #111; color: #fff; }
  .vol-opt-btn .vol-size { font-weight: 700; font-size: 0.85rem; display: block; margin-bottom: 2px; }
  .vol-opt-btn .vol-p { font-size: 0.7rem; opacity: 0.8; }
  .vol-confirm-btn { width: 100%; background: #111; color: #fff; border: none; padding: 14px; font-family: 'Open Sans', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
  .vol-confirm-btn:hover { background: #333; }
  .vol-confirm-btn.added { background: #2e7d32; }

  /* PAGE */
  .page-wrap { margin-top: 52px; padding-bottom: 80px; }
  .search-wrap { padding: 14px 14px 0; max-width: 900px; margin: 0 auto; }
  .search-box { display: flex; align-items: center; gap: 8px; border: 1px solid #e8e8e8; border-radius: 8px; padding: 8px 12px; background: #f9f9f9; }
  .search-box svg { color: #bbb; flex-shrink: 0; }
  .search-input { flex: 1; border: none; outline: none; font-family: 'Open Sans', sans-serif; font-size: 0.82rem; color: #222; background: transparent; }
  .search-input::placeholder { color: #ccc; }
  .search-clear { background: none; border: none; cursor: pointer; color: #ccc; font-size: 0.9rem; display: none; }
  .search-clear.show { display: block; }
  .filter-wrap { padding: 10px 14px 0; max-width: 900px; margin: 0 auto; }
  .filter-row { display: flex; gap: 5px; }
  .filter-btn { flex: 1; border: 1px solid #e8e8e8; background: #fff; color: #777; padding: 4px 3px; font-family: 'Open Sans', sans-serif; font-size: 0.55rem; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s; text-align: center; }
  .filter-btn:hover { border-color: #111; color: #111; }
  .filter-btn.active { background: #111; color: #fff; border-color: #111; }
  .results-info { padding: 10px 14px 6px; max-width: 900px; margin: 0 auto; font-size: 0.68rem; color: #ccc; }

  /* GRID */
  .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #ececec; max-width: 900px; margin: 0 auto; }
  .product-card { background: #fff; cursor: pointer; }
  .product-card:active { background: #fafafa; }
  .product-img-wrap { background: #fff; aspect-ratio: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 6px; overflow: hidden; border-bottom: 1px solid #f5f5f5; }
  .product-img { width: 115%; height: 115%; object-fit: contain; transition: transform 0.3s ease; }
  .product-card:hover .product-img { transform: scale(1.05); }
  .product-img-placeholder { display: flex; align-items: center; justify-content: center; }
  .badge-wrap { position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; gap: 3px; z-index: 1; }
  .badge { font-size: 0.5rem; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; font-weight: 700; display: inline-block; }
  .badge-new { background: #e53935; color: #fff; }
  .badge-lowstock { background: #fff8e1; color: #e65100; border: 1px solid #ffcc02; }
  .product-info { padding: 8px 10px 12px; }
  .product-type { font-family: 'Courier New', monospace; font-size: 0.58rem; color: #ccc; margin-bottom: 2px; }
  .product-name { font-size: 0.78rem; font-weight: 700; color: #111; margin-bottom: 4px; letter-spacing: 0; line-height: 1.2; }
  .product-price { font-size: 0.8rem; font-weight: 600; color: #111; margin-bottom: 7px; }
  .add-bag-btn { width: 100%; background: #111; color: #fff; border: none; padding: 7px; font-family: 'Open Sans', sans-serif; font-size: 0.58rem; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
  .add-bag-btn:hover { background: #333; }
  .add-bag-btn.out { background: #f0f0f0; color: #bbb; cursor: not-allowed; }
  .add-bag-btn.hidden-stock { background: #f5f5f5; color: #ccc; cursor: not-allowed; opacity: 0.6; }
  .add-bag-btn.added { background: #2e7d32; }
  .empty-state { text-align: center; padding: 60px 20px; color: #bbb; font-size: 0.85rem; grid-column: 1/-1; }

  /* DETAIL */
  .detail-page { display: none; position: fixed; inset: 0; background: #fff; z-index: 150; overflow-y: auto; }
  .detail-page.open { display: block; }
  .detail-nav { height: 52px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 10; }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; color: #555; padding: 0; }
  .back-btn:hover { color: #111; }
  .detail-content { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
  .detail-img-wrap { aspect-ratio: 4/3; background: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; border-bottom: 1px solid #f5f5f5; }
  .detail-img { width: 115%; height: 115%; object-fit: contain; }
  .detail-info { padding: 16px 20px; }
  .detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .badge-detail-new { background: #e53935; color: #fff; font-size: 0.5rem; letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px; font-weight: 700; }
  .badge-detail-cat { background: #f0f0f0; color: #555; font-size: 0.5rem; letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px; font-weight: 600; }
  .badge-detail-low { background: #fff8e1; color: #e65100; border: 1px solid #ffcc02; font-size: 0.5rem; letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px; font-weight: 700; }
  .detail-type { font-family: 'Courier New', monospace; font-size: 0.68rem; color: #bbb; margin-bottom: 2px; }
  .detail-brand { font-size: 0.78rem; color: #999; margin-bottom: 2px; }
  .detail-name { font-size: 1.2rem; font-weight: 700; color: #111; margin-bottom: 12px; letter-spacing: 0; line-height: 1.2; }
  .detail-row { margin-bottom: 10px; }
  .detail-label { font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase; color: #ccc; margin-bottom: 3px; }
  .detail-value { font-size: 0.82rem; color: #444; line-height: 1.5; }
  .vol-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
  .vol-btn { border: 1px solid #e0e0e0; background: #fff; padding: 5px 12px; font-family: 'Open Sans', sans-serif; font-size: 0.7rem; cursor: pointer; border-radius: 5px; transition: all 0.2s; }
  .vol-btn.active { border-color: #111; background: #111; color: #fff; }
  .detail-price { font-size: 1.15rem; font-weight: 700; color: #111; margin-bottom: 16px; }
  .detail-sold { font-size: 0.65rem; color: #ccc; margin-bottom: 4px; }
  .desc-text { font-size: 0.82rem; color: #555; line-height: 1.75; margin-top: 4px; }
  .detail-add-btn { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #111; color: #fff; border: none; padding: 16px 20px; font-family: 'Open Sans', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .detail-add-btn:hover { background: #333; }
  .detail-add-btn.added { background: #2e7d32; }
  .detail-add-btn.hidden-stock { background: #f0f0f0; color: #bbb; cursor: not-allowed; }

  footer { background: #000; padding: 40px 0 32px; }
  .footer-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  .footer-brand { font-size: 1.3rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; text-align: center; margin-bottom: 36px; }
  .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 36px; }
  @media (min-width: 600px) { .footer-grid { grid-template-columns: repeat(4, 1fr); } }
  .footer-col-title { font-size: 0.65rem; font-weight: 600; color: #fff; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
  .footer-link { display: block; font-size: 0.8rem; color: #888; text-decoration: none; margin-bottom: 8px; }
  .footer-link:hover { color: #fff; }
  .footer-social { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
  .social-icon { background: none; border: none; cursor: pointer; color: #666; display: flex; align-items: center; transition: color 0.2s; padding: 4px; }
  .social-icon:hover { color: #fff; }
  .footer-bottom { text-align: center; font-size: 0.72rem; color: #555; border-top: 1px solid #222; padding-top: 20px; }
</style>
</head>
<body>

<!-- VOLUME POPUP -->
<div class="vol-popup-overlay" id="volPopupOverlay" onclick="closeVolPopup(event)">
  <div class="vol-popup">
    <div class="vol-popup-title">Select Volume</div>
    <div class="vol-popup-name" id="volPopupName"></div>
    <div class="bottle-anim-wrap" id="bottleAnimWrap"></div>
    <div class="vol-options" id="volOptions"></div>
    <button class="vol-confirm-btn" id="volConfirmBtn" onclick="confirmVolume()">Add to Bag</button>
  </div>
</div>

<!-- BAG PANEL -->
<div class="bag-overlay" id="bagOverlay" onclick="closeBag()"></div>
<div class="bag-panel" id="bagPanel">
  <div class="bag-header">
    <span class="bag-title">Your Bag</span>
    <button class="bag-close" onclick="closeBag()">✕</button>
  </div>
  <div class="bag-items" id="bagItems"></div>
  <div class="bag-footer" id="bagFooter" style="display:none;">
    <div class="bag-total-row">
      <span class="bag-total-label">Total</span>
      <span class="bag-total-amt" id="bagTotal">0 Ks</span>
    </div>
    <button class="bag-checkout-btn" onclick="window.location.href='../cart'">Checkout →</button>
  </div>
</div>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="dropdown-menu" id="dropdownMenu">
  <button class="menu-item" onclick="window.location.href='../home'">Home</button>
  <button class="menu-item" onclick="openAMoment()">A Moment</button>
  <button class="menu-item" onclick="window.location.href='../shop'">Shop</button>
  <button class="menu-item" onclick="window.location.href='../catalog'">Catalog</button>
  <button class="menu-item">Store</button>
  <button class="menu-item" onclick="window.location.href='../about'">About</button>
  <button class="menu-item" onclick="window.location.href='../contact'">Contact</button>
</div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="https://suvannarangoon.github.io/suvanna/home">
      <img src="../home/logo.PNG" alt="Suvanna">
    </a>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="openBag()" title="Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z"/>
        </svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="burger" id="burgerBtn" onclick="toggleMenu()">
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</nav>

<!-- PAGE -->
<div class="page-wrap">
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0015.803 15.803z"/>
      </svg>
      <input class="search-input" type="text" id="searchInput" placeholder="Search perfumes..." oninput="onSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="filter-wrap">
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('new',this)">New</button>
      <button class="filter-btn" onclick="setFilter('men',this)">Men</button>
      <button class="filter-btn" onclick="setFilter('women',this)">Women</button>
      <button class="filter-btn" onclick="setFilter('unisex',this)">Unisex</button>
    </div>
  </div>
  <div class="results-info" id="resultsInfo"></div>
  <div class="catalog-grid" id="catalogGrid">
    <div class="empty-state">Products ဖတ်နေသည်...</div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div class="detail-page" id="detailPage">
  <div class="detail-nav">
    <button class="back-btn" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
      </svg>
      Back
    </button>
  </div>
  <div class="detail-content" id="detailContent"></div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">Suvanna</div>
    <div class="footer-grid">
      <div>
        <div class="footer-col-title">Products</div>
        <a class="footer-link" href="../catalog">Catalog</a>
        <a class="footer-link" href="../shop">Shop</a>
      </div>
      <div>
        <div class="footer-col-title">Suvanna Store</div>
        <a class="footer-link" href="#">Find a Store</a>
        <a class="footer-link" href="#">Online Store</a>
      </div>
      <div>
        <div class="footer-col-title">Customer Care</div>
        <a class="footer-link" href="#">Returns</a>
        <a class="footer-link" href="#">Delivery</a>
        <a class="footer-link" href="#">Shipping</a>
        <a class="footer-link" href="../contact">Contact Us</a>
      </div>
      <div>
        <div class="footer-col-title">About Suvanna</div>
        <a class="footer-link" href="../about">About Us</a>
        <a class="footer-link" href="#">Career Opportunities</a>
        <a class="footer-link" href="#">Investors</a>
        <a class="footer-link" href="#">Staff Training</a>
      </div>
    </div>
    <div class="footer-social">
      <button class="social-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></button>
      <button class="social-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg></button>
      <button class="social-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.17 8.17 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg></button>
    </div>
    <div class="footer-bottom">© 2026 Suvanna Rangoon. All rights reserved.</div>
  </div>
</footer>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzmyuThMPBFMVrDqFp1QHneRzngPBhQsc_rOF2QHZBdfVBefv7fnVPduwE6arS0mSQj/exec";
let allProducts = [];
let currentFilter = 'all';
let currentSearch = '';
let selectedVol = {};
let volPopupProduct = null;
let volPopupSelectedIdx = 0;

/* SVG */
const SVG_30ML = '<svg width="36" height="62" viewBox="0 0 48 82" fill="none"><rect x="15" y="2" width="18" height="24" rx="4" stroke="#111" stroke-width="1.8" fill="none"/><rect x="3" y="30" width="42" height="48" rx="4" stroke="#111" stroke-width="1.8" fill="none"/></svg>';
const SVG_10ML = '<svg width="32" height="72" viewBox="0 0 48 97" fill="none"><rect x="15" y="2" width="18" height="24" rx="4" stroke="#111" stroke-width="1.8" fill="none"/><rect x="1" y="30" width="46" height="67" rx="4" stroke="#111" stroke-width="1.8" fill="none"/></svg>';
const SVG_30ML_DIM = '<svg width="36" height="62" viewBox="0 0 48 82" fill="none"><rect x="15" y="2" width="18" height="24" rx="4" stroke="#ccc" stroke-width="1.8" fill="none"/><rect x="3" y="30" width="42" height="48" rx="4" stroke="#ccc" stroke-width="1.8" fill="none"/></svg>';
const SVG_10ML_DIM = '<svg width="32" height="72" viewBox="0 0 48 97" fill="none"><rect x="15" y="2" width="18" height="24" rx="4" stroke="#ccc" stroke-width="1.8" fill="none"/><rect x="1" y="30" width="46" height="67" rx="4" stroke="#ccc" stroke-width="1.8" fill="none"/></svg>';

/* CART */
function getCart() { try { return JSON.parse(localStorage.getItem('suvanna_cart')||'[]'); } catch { return []; } }
function saveCart(c) { localStorage.setItem('suvanna_cart', JSON.stringify(c)); updateCartBadge(); }
function updateCartBadge() {
  const total = getCart().reduce(function(s,i){ return s+i.qty; },0);
  const b = document.getElementById('cartBadge');
  if (total>0){ b.textContent=total; b.classList.add('show'); } else { b.classList.remove('show'); }
}
function addToCartDirect(id, volIdx) {
  const p = groupByID(allProducts).find(function(x){ return x.id===id; });
  if (!p) return;
  const vol = p.volumes[volIdx||0];
  const cart = getCart();
  const key = id+'_'+vol.volume;
  const ex = cart.find(function(i){ return i.key===key; });
  if (ex) { ex.qty+=1; } else {
    cart.push({ key:key, id:id, name:p.name, brand:p.brand, type:p.type,
      volume:vol.volume, price:vol.price, image:p.image, qty:1 });
  }
  saveCart(cart);
}
function changeQty(key,delta) {
  const cart=getCart(); const idx=cart.findIndex(function(i){ return i.key===key; });
  if (idx<0) return; cart[idx].qty+=delta; if (cart[idx].qty<=0) cart.splice(idx,1);
  saveCart(cart); renderBagItems();
}
function removeItem(key) { saveCart(getCart().filter(function(i){ return i.key!==key; })); renderBagItems(); }

/* BAG */
function openBag() { renderBagItems(); document.getElementById('bagOverlay').classList.add('open'); document.getElementById('bagPanel').classList.add('open'); document.body.style.overflow='hidden'; }
function closeBag() { document.getElementById('bagOverlay').classList.remove('open'); document.getElementById('bagPanel').classList.remove('open'); document.body.style.overflow=''; }
function renderBagItems() {
  const cart=getCart(); const container=document.getElementById('bagItems'); const footer=document.getElementById('bagFooter');
  if (!cart.length) { container.innerHTML='<div class="bag-empty">Bag is empty</div>'; footer.style.display='none'; return; }
  footer.style.display='block'; let total=0;
  container.innerHTML=cart.map(function(item){
    total+=item.price*item.qty;
    const imgSrc=item.image?'../catalog/images/'+item.image:null;
    const imgHtml=imgSrc?'<img class="bag-item-img" src="'+imgSrc+'" onerror="this.style.display=\'none\'">'
      :'<div class="bag-item-img-placeholder"><svg width="20" height="20" viewBox="0 0 48 68" fill="none"><rect x="16" y="2" width="16" height="16" rx="4" stroke="#ddd" stroke-width="1.5" fill="none"/><rect x="3" y="22" width="42" height="42" rx="8" stroke="#ddd" stroke-width="1.5" fill="none"/></svg></div>';
    return '<div class="bag-item">'+imgHtml+'<div class="bag-item-info"><div class="bag-item-name">'+item.name+'</div><div class="bag-item-vol">'+item.volume+'</div><div class="bag-item-price">'+Number(item.price).toLocaleString()+' Ks</div></div><div class="bag-item-right"><div class="qty-row"><button class="qty-btn" onclick="changeQty(\''+item.key+'\',-1)">−</button><span class="qty-num">'+item.qty+'</span><button class="qty-btn" onclick="changeQty(\''+item.key+'\',1)">+</button></div><button class="bag-item-remove" onclick="removeItem(\''+item.key+'\')">Remove</button></div></div>';
  }).join('');
  document.getElementById('bagTotal').textContent=Number(total).toLocaleString()+' Ks';
}

/* VOLUME POPUP */
function openVolPopup(id, triggerBtn) {
  const grouped = groupByID(allProducts);
  const p = grouped.find(function(x){ return x.id===id; });
  if (!p) return;

  // Single volume — add directly
  if (p.volumes.length === 1) {
    addToCartDirect(id, 0);
    if (triggerBtn) { triggerBtn.textContent='Added ✓'; triggerBtn.classList.add('added'); setTimeout(function(){ triggerBtn.textContent='Add to Bag'; triggerBtn.classList.remove('added'); },1500); }
    return;
  }

  volPopupProduct = p;
  volPopupSelectedIdx = 0;
  document.getElementById('volPopupName').textContent = p.name;
  renderVolPopup();
  document.getElementById('volPopupOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderVolPopup() {
  const p = volPopupProduct;
  const wrap = document.getElementById('bottleAnimWrap');
  const opts = document.getElementById('volOptions');

  // Determine which volumes exist
  const has10 = p.volumes.findIndex(function(v){ return v.volume && v.volume.includes('10'); });
  const has30 = p.volumes.findIndex(function(v){ return v.volume && v.volume.includes('30'); });

  // Bottle animation
  let bottleHTML = '';
  p.volumes.forEach(function(v, i) {
    const is10 = v.volume && v.volume.includes('10');
    const isActive = i === volPopupSelectedIdx;
    const svgActive = is10 ? SVG_10ML : SVG_30ML;
    const svgDim = is10 ? SVG_10ML_DIM : SVG_30ML_DIM;
    bottleHTML += '<div class="bottle-slot '+(isActive?'active':'inactive')+'" onclick="selectVolPopup('+i+')">'
      +'<div class="bottle-svg-wrap">'+(isActive?svgActive:svgDim)+'</div>'
      +'<div class="bottle-label">'+v.volume+'</div>'
      +'<div class="bottle-price">'+Number(v.price).toLocaleString()+' Ks</div>'
      +'</div>';
  });
  wrap.innerHTML = bottleHTML;

  // Options buttons
  opts.innerHTML = p.volumes.map(function(v,i){
    return '<button class="vol-opt-btn '+(i===volPopupSelectedIdx?'selected':'')+'" onclick="selectVolPopup('+i+')">'
      +'<span class="vol-size">'+v.volume+'</span>'
      +'<span class="vol-p">'+Number(v.price).toLocaleString()+' Ks</span>'
      +'</button>';
  }).join('');
}

function selectVolPopup(idx) {
  volPopupSelectedIdx = idx;
  renderVolPopup();
}

function closeVolPopup(e) {
  if (!e || e.target===document.getElementById('volPopupOverlay')) {
    document.getElementById('volPopupOverlay').classList.remove('open');
    document.body.style.overflow='';
    volPopupProduct=null;
  }
}

function confirmVolume() {
  if (!volPopupProduct) return;
  addToCartDirect(volPopupProduct.id, volPopupSelectedIdx);
  const btn = document.getElementById('volConfirmBtn');
  btn.textContent='Added ✓'; btn.classList.add('added');
  setTimeout(function(){
    btn.textContent='Add to Bag'; btn.classList.remove('added');
    document.getElementById('volPopupOverlay').classList.remove('open');
    document.body.style.overflow='';
    volPopupProduct=null;
  },1200);
}

/* PRODUCTS */
function groupByID(products) {
  const map={};
  products.forEach(function(p){
    if (!map[p.id]) map[p.id]=Object.assign({},p,{volumes:[]});
    map[p.id].volumes.push({volume:p.volume,price:p.price,inStock:p.inStock,sold:p.sold,stockStatus:p.stockStatus,availability:p.availability});
  });
  return Object.values(map);
}

function getStockStatus(vol) {
  const n = parseInt(vol.inStock) || 0;
  if (n <= 0) return 'out';
  if (n <= 3) return 'low';
  return 'ok';
}

function bottleSVGSmall(s) {
  var h=Math.round(s*1.4);
  return '<svg width="'+s+'" height="'+h+'" viewBox="0 0 48 68" fill="none"><rect x="16" y="2" width="16" height="16" rx="4" stroke="#ddd" stroke-width="1.5" fill="none"/><rect x="3" y="22" width="42" height="42" rx="8" stroke="#ddd" stroke-width="1.5" fill="none"/></svg>';
}

function getFiltered() {
  var r=allProducts;
  if (currentFilter==='new') r=r.filter(function(p){ return p.status==='New'; });
  else if (currentFilter!=='all') r=r.filter(function(p){ return p.category&&p.category.toLowerCase()===currentFilter; });
  if (currentSearch.trim()) {
    var q=currentSearch.toLowerCase();
    r=r.filter(function(p){ return (p.name&&p.name.toLowerCase().includes(q))||(p.brand&&p.brand.toLowerCase().includes(q))||(p.notes&&p.notes.toLowerCase().includes(q)); });
  }
  return r;
}

function renderGrid() {
  const grouped=groupByID(getFiltered());
  const grid=document.getElementById('catalogGrid');
  document.getElementById('resultsInfo').textContent=grouped.length+' items';
  if (!grouped.length){ grid.innerHTML='<div class="empty-state">Product မတွေ့ပါ</div>'; return; }
  grid.innerHTML=grouped.map(function(p){
    const vol=p.volumes[0];
    const stock=getStockStatus(vol);
    const isHidden=p.availability==='Hidden';
    const imgSrc=p.image?'../catalog/images/'+p.image:null;
    const newBadge=p.status==='New'?'<span class="badge badge-new">New</span>':'';
    const lowBadge=(!isHidden&&stock==='low')?'<span class="badge badge-lowstock">Low Stock</span>':'';
    const imgHtml=imgSrc?'<img class="product-img" src="'+imgSrc+'" alt="'+p.name+'" onerror="this.style.display=\'none\'">'
      :'<div class="product-img-placeholder">'+bottleSVGSmall(52)+'</div>';
    let btnHtml;
    if (isHidden) btnHtml='<button class="add-bag-btn hidden-stock" disabled>Add to Bag</button>';
    else if (stock==='out') btnHtml='<button class="add-bag-btn out" disabled>Out of Stock</button>';
    else btnHtml='<button class="add-bag-btn" onclick="event.stopPropagation();openVolPopup(\''+p.id+'\',this)">Add to Bag</button>';
    return '<div class="product-card" onclick="openDetail(\''+p.id+'\')">'+
      '<div class="product-img-wrap"><div class="badge-wrap">'+newBadge+lowBadge+'</div>'+imgHtml+'</div>'+
      '<div class="product-info">'+
        '<div class="product-type">'+(p.type==='Inspired'?'inspired by':'suvanna')+'</div>'+
        '<div class="product-name">'+p.name+'</div>'+
        '<div class="product-price">'+Number(vol.price).toLocaleString()+' Ks</div>'+
        btnHtml+
      '</div></div>';
  }).join('');
}

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active'); renderGrid();
}
function onSearch(val) {
  currentSearch=val;
  document.getElementById('searchClear').classList.toggle('show',val.length>0);
  renderGrid();
}
function clearSearch() {
  document.getElementById('searchInput').value='';
  currentSearch='';
  document.getElementById('searchClear').classList.remove('show');
  renderGrid();
}

/* DETAIL */
function openDetail(id) {
  const p=groupByID(allProducts).find(function(x){ return x.id===id; });
  if (!p) return;
  selectedVol[id]=0;
  renderDetail(p);
  document.getElementById('detailPage').classList.add('open');
  document.body.style.overflow='hidden';
  history.pushState({id:id},'','?id='+id);
}

function renderDetail(p) {
  const idx=selectedVol[p.id]||0;
  const vol=p.volumes[idx];
  const stock=getStockStatus(vol);
  const isHidden=p.availability==='Hidden';
  const imgSrc=p.image?'../catalog/images/'+p.image:null;
  const desc=p.description||'';
  const moodVal=p.mood?p.mood.replace(/[,\/]+/g,' • ').trim():'';
  const imgHtml=imgSrc?'<img class="detail-img" src="'+imgSrc+'" alt="'+p.name+'" onerror="this.style.display=\'none\'">'
    :'<div>'+bottleSVGSmall(80)+'</div>';
  const volBtns=p.volumes.map(function(v,i){
    return '<button class="vol-btn '+(i===idx?'active':'')+'" onclick="selectVol(\''+p.id+'\','+i+')">'+v.volume+'</button>';
  }).join('');
  const newBadge=p.status==='New'?'<span class="badge-detail-new">New</span>':'';
  const catBadge=p.category?'<span class="badge-detail-cat">'+p.category+'</span>':'';
  const lowBadge=(!isHidden&&stock==='low')?'<span class="badge-detail-low">Low Stock</span>':'';
  let addBtn='';
  if (isHidden) addBtn='<button class="detail-add-btn hidden-stock" disabled>Add to Bag</button>';
  else if (stock!=='out') addBtn='<button class="detail-add-btn" id="detailAddBtn" onclick="handleDetailAdd(\''+p.id+'\','+idx+')">Add to Bag</button>';

  document.getElementById('detailContent').innerHTML=
    '<div class="detail-img-wrap">'+imgHtml+'</div>'+
    '<div class="detail-info">'+
      '<div class="detail-badges">'+newBadge+catBadge+lowBadge+'</div>'+
      '<div class="detail-type">'+(p.type==='Inspired'?'inspired by':'suvanna original')+'</div>'+
      '<div class="detail-brand">'+(p.brand||'')+'</div>'+
      '<div class="detail-name">'+p.name+'</div>'+
      (p.notes?'<div class="detail-row"><div class="detail-label">Scent Notes</div><div class="detail-value">'+p.notes+'</div></div>':'')+
      (moodVal?'<div class="detail-row"><div class="detail-label">Mood</div><div class="detail-value">'+moodVal+'</div></div>':'')+
      '<div class="detail-row"><div class="detail-label">Volume</div><div class="vol-row">'+volBtns+'</div></div>'+
      '<div class="detail-price">'+Number(vol.price).toLocaleString()+' Ks</div>'+
      (vol.sold>0?'<div class="detail-sold">'+vol.sold+' sold</div>':'')+
      (desc?'<div class="detail-row"><div class="detail-label">Description</div><div class="desc-text">'+desc+'</div></div>':'')+
    '</div>'+addBtn;
}

function handleDetailAdd(id,vi) {
  addToCartDirect(id,vi);
  const btn=document.getElementById('detailAddBtn');
  btn.textContent='Added ✓'; btn.classList.add('added');
  setTimeout(function(){ btn.textContent='Add to Bag'; btn.classList.remove('added'); },1500);
}
function selectVol(id,idx) {
  selectedVol[id]=idx;
  const p=groupByID(allProducts).find(function(x){ return x.id===id; });
  if (p) renderDetail(p);
}
function closeDetail() {
  document.getElementById('detailPage').classList.remove('open');
  document.body.style.overflow='';
  history.pushState({},'',window.location.pathname);
}
function toggleMenu() {
  document.getElementById('burgerBtn').classList.toggle('open');
  document.getElementById('dropdownMenu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
}
function openAMoment() {
  toggleMenu();
  setTimeout(function(){ window.location.href='../home'; },300);
}
window.addEventListener('popstate',function(e){
  if (document.getElementById('detailPage').classList.contains('open')){
    document.getElementById('detailPage').classList.remove('open');
    document.body.style.overflow='';
  }
});
async function loadProducts() {
  try {
    const res=await fetch(SHEET_URL);
    const data=await res.json();
    if (data.success&&data.products){
      allProducts=data.products; renderGrid();
      const params=new URLSearchParams(window.location.search);
      const id=params.get('id');
      if (id){
        const p=groupByID(allProducts).find(function(x){ return x.id===id; });
        if (p){ selectedVol[id]=0; renderDetail(p); document.getElementById('detailPage').classList.add('open'); document.body.style.overflow='hidden'; }
      }
    }
  } catch(err){
    document.getElementById('catalogGrid').innerHTML='<div class="empty-state">ချိတ်ဆက်မရပါ၊ ထပ်ကြိုးစားပါ</div>';
  }
}
updateCartBadge();
loadProducts();
</script>
</body>
