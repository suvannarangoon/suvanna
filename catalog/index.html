<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog — Suvanna Rangoon</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Open Sans', sans-serif; background: #fff; color: #222; overflow-x: hidden; }

  nav {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    height: 52px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .nav-inner { width: 100%; max-width: 900px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 100%; }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-logo img { height: 16px; width: auto; display: block; }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .burger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .burger span { display: block; width: 20px; height: 1.5px; background: #333; transition: all 0.3s ease; transform-origin: center; }
  .burger.open span:nth-child(1) { transform: translateY(3.25px) rotate(45deg); }
  .burger.open span:nth-child(2) { transform: translateY(-3.25px) rotate(-45deg); }

  .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .menu-overlay.open { opacity: 1; pointer-events: all; }
  .dropdown-menu { position: fixed; top: 0; right: 0; bottom: 0; width: 260px; background: #fff; z-index: 95; padding: 72px 28px 32px; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
  .dropdown-menu.open { transform: translateX(0); }
  .menu-item { display: block; padding: 13px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #222; cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; text-align: left; width: 100%; font-family: 'Open Sans', sans-serif; transition: color 0.2s; }
  .menu-item:hover { color: #888; }

  /* PAGE */
  .page-wrap { margin-top: 52px; }

  /* FILTER */
  .filter-wrap { padding: 20px 16px 0; max-width: 900px; margin: 0 auto; }
  .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 16px; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; border: 1px solid #e0e0e0; background: #fff; color: #555; padding: 7px 16px; font-family: 'Open Sans', sans-serif; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 999px; transition: all 0.2s; white-space: nowrap; }
  .filter-btn:hover { border-color: #111; color: #111; }
  .filter-btn.active { background: #111; color: #fff; border-color: #111; }

  /* GRID */
  .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #f0f0f0; max-width: 900px; margin: 0 auto; }
  @media (min-width: 600px) { .catalog-grid { grid-template-columns: repeat(3, 1fr); } }

  .product-card { background: #fff; cursor: pointer; position: relative; }
  .product-card:hover .product-img { transform: scale(1.03); }

  .product-img-wrap { overflow: hidden; aspect-ratio: 3/4; background: #f9f9f9; position: relative; }
  .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
  .product-img-placeholder svg { opacity: 0.15; }

  .badge-wrap { position: absolute; top: 10px; left: 10px; display: flex; gap: 6px; z-index: 1; }
  .badge { font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; font-weight: 600; }
  .badge-new { background: #111; color: #fff; }
  .badge-lowstock { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
  .badge-outofstock { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

  .product-info { padding: 12px 14px 16px; }
  .product-type { font-size: 0.6rem; color: #bbb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .product-brand { font-size: 0.65rem; color: #999; letter-spacing: 0; margin-bottom: 3px; }
  .product-name { font-size: 0.85rem; font-weight: 600; color: #111; margin-bottom: 6px; letter-spacing: 0; line-height: 1.3; }
  .product-notes { font-size: 0.7rem; color: #aaa; margin-bottom: 8px; letter-spacing: 0; }
  .product-volume { font-size: 0.65rem; color: #bbb; margin-bottom: 6px; }
  .product-price { font-size: 0.9rem; font-weight: 600; color: #111; margin-bottom: 4px; }
  .product-sold { font-size: 0.65rem; color: #bbb; }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: #bbb; font-size: 0.85rem; }

  /* DETAIL PAGE */
  .detail-page { display: none; position: fixed; inset: 0; background: #fff; z-index: 150; overflow-y: auto; }
  .detail-page.open { display: block; }

  .detail-nav { height: 52px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 10; }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; color: #555; padding: 0; }
  .back-btn:hover { color: #111; }

  .detail-content { max-width: 600px; margin: 0 auto; padding: 0 0 80px; }

  .detail-img-wrap { aspect-ratio: 1; background: #f9f9f9; overflow: hidden; }
  .detail-img { width: 100%; height: 100%; object-fit: cover; }
  .detail-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }

  .detail-info { padding: 24px 20px; }
  .detail-badges { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .detail-type { font-size: 0.65rem; color: #bbb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .detail-brand { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
  .detail-name { font-size: 1.4rem; font-weight: 700; color: #111; margin-bottom: 16px; letter-spacing: 0; line-height: 1.2; }

  .detail-section-label { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: #bbb; margin-bottom: 8px; }
  .detail-notes { font-size: 0.85rem; color: #555; margin-bottom: 20px; letter-spacing: 0; }

  .volume-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .vol-btn { border: 1px solid #e0e0e0; background: #fff; padding: 8px 16px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
  .vol-btn.active { border-color: #111; background: #111; color: #fff; }
  .vol-btn:hover:not(.active) { border-color: #999; }

  .detail-price { font-size: 1.4rem; font-weight: 700; color: #111; margin-bottom: 6px; }
  .detail-sold { font-size: 0.75rem; color: #bbb; margin-bottom: 20px; }
  .detail-stock-status { font-size: 0.75rem; margin-bottom: 20px; }
  .detail-stock-instock { color: #2e7d32; }
  .detail-stock-low { color: #f57f17; }
  .detail-stock-out { color: #c62828; }

  .detail-desc { font-size: 0.9rem; color: #555; line-height: 1.8; letter-spacing: 0; }
  .read-more-btn { background: none; border: none; color: #111; font-family: 'Open Sans', sans-serif; font-size: 0.8rem; cursor: pointer; text-decoration: underline; margin-top: 6px; padding: 0; }

  .add-to-bag-btn { width: 100%; background: #111; color: #fff; border: none; padding: 16px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 6px; margin-top: 20px; transition: background 0.3s; }
  .add-to-bag-btn:hover { background: #333; }

  /* FOOTER */
  footer { background: #000; padding: 40px 0 32px; }
  .footer-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  .footer-brand { font-size: 1.3rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; text-align: center; margin-bottom: 36px; }
  .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 36px; }
  @media (min-width: 600px) { .footer-grid { grid-template-columns: repeat(4, 1fr); } }
  .footer-col-title { font-size: 0.65rem; font-weight: 600; color: #fff; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
  .footer-link { display: block; font-size: 0.8rem; color: #888; text-decoration: none; margin-bottom: 8px; }
  .footer-link:hover { color: #fff; }
  .footer-social { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
  .social-icon { background: none; border: none; cursor: pointer; color: #666; display: flex; align-items: center; transition: color 0.2s; padding: 4px; }
  .social-icon:hover { color: #fff; }
  .footer-bottom { text-align: center; font-size: 0.72rem; color: #555; border-top: 1px solid #222; padding-top: 20px; }
</style>
</head>
<body>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="dropdown-menu" id="dropdownMenu">
  <button class="menu-item" onclick="window.location.href='../home'">Home</button>
  <button class="menu-item">A Moment</button>
  <button class="menu-item">Shop</button>
  <button class="menu-item">Store</button>
  <button class="menu-item" onclick="window.location.href='../about'">About</button>
  <button class="menu-item" onclick="window.location.href='../contact'">Contact</button>
</div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="https://suvannarangoon.github.io/suvanna/home">
      <img src="../home/logo.PNG" alt="Suvanna">
    </a>
    <div class="nav-right">
      <button class="burger" id="burgerBtn" onclick="toggleMenu()">
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</nav>

<!-- CATALOG PAGE -->
<div class="page-wrap" id="catalogPage">

  <!-- FILTER -->
  <div class="filter-wrap">
    <div class="filter-scroll" id="filterScroll">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('men', this)">Men</button>
      <button class="filter-btn" onclick="setFilter('women', this)">Women</button>
      <button class="filter-btn" onclick="setFilter('unisex', this)">Unisex</button>
      <button class="filter-btn" onclick="setFilter('new', this)">New</button>
      <button class="filter-btn" onclick="setFilter('featured', this)">Featured</button>
      <button class="filter-btn" onclick="setFilter('inspired', this)">Inspired</button>
      <button class="filter-btn" onclick="setFilter('suvanna', this)">Suvanna</button>
    </div>
  </div>

  <!-- GRID -->
  <div class="catalog-grid" id="catalogGrid">
    <div class="loading" style="grid-column: 1/-1;">Products ဖတ်နေသည်...</div>
  </div>

</div>

<!-- DETAIL PAGE -->
<div class="detail-page" id="detailPage">
  <div class="detail-nav">
    <button class="back-btn" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
      </svg>
      Back
    </button>
  </div>
  <div class="detail-content" id="detailContent"></div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">Suvanna</div>
    <div class="footer-grid">
      <div>
        <div class="footer-col-title">Products</div>
        <a class="footer-link" href="#">Catalog</a>
        <a class="footer-link" href="#">Shop</a>
      </div>
      <div>
        <div class="footer-col-title">Suvanna Store</div>
        <a class="footer-link" href="#">Find a Store</a>
        <a class="footer-link" href="#">Online Store</a>
      </div>
      <div>
        <div class="footer-col-title">Customer Care</div>
        <a class="footer-link" href="#">Returns</a>
        <a class="footer-link" href="#">Delivery</a>
        <a class="footer-link" href="#">Shipping</a>
        <a class="footer-link" href="#">Contact Us</a>
      </div>
      <div>
        <div class="footer-col-title">About Suvanna</div>
        <a class="footer-link" href="#">About Us</a>
        <a class="footer-link" href="#">Career Opportunities</a>
        <a class="footer-link" href="#">Investors</a>
        <a class="footer-link" href="#">Staff Training</a>
      </div>
    </div>
    <div class="footer-social">
      <button class="social-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
        </svg>
      </button>
      <button class="social-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
        </svg>
      </button>
      <button class="social-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.17 8.17 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/>
        </svg>
      </button>
    </div>
    <div class="footer-bottom">© 2026 Suvanna Rangoon. All rights reserved.</div>
  </div>
</footer>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzmyuThMPBFMVrDqFp1QHneRzngPBhQsc_rOF2QHZBdfVBefv7fnVPduwE6arS0mSQj/exec";

let allProducts = [];
let currentFilter = 'all';
let selectedVolumes = {};

// Group products by ID
function groupByID(products) {
  const map = {};
  products.forEach(p => {
    if (!map[p.id]) {
      map[p.id] = { ...p, volumes: [] };
    }
    map[p.id].volumes.push({
      volume: p.volume,
      price: p.price,
      inStock: p.inStock,
      sold: p.sold,
      stockStatus: p.stockStatus
    });
  });
  return Object.values(map);
}

function getStockBadge(stockStatus) {
  if (stockStatus === 'Out of Stock') return '<span class="badge badge-outofstock">Out of Stock</span>';
  if (stockStatus === 'Low Stock') return '<span class="badge badge-lowstock">Low Stock</span>';
  return '';
}

function getBottleSVG() {
  return `<svg width="48" height="72" viewBox="0 0 48 80" fill="none">
    <rect x="16" y="2" width="16" height="18" rx="4" stroke="#ccc" stroke-width="1.5" fill="none"/>
    <rect x="3" y="24" width="42" height="52" rx="8" stroke="#ccc" stroke-width="1.5" fill="none"/>
  </svg>`;
}

function renderGrid(products) {
  const grid = document.getElementById('catalogGrid');
  const grouped = groupByID(products);

  if (grouped.length === 0) {
    grid.innerHTML = '<div class="loading" style="grid-column:1/-1;">Product မတွေ့ပါ</div>';
    return;
  }

  grid.innerHTML = grouped.map(p => {
    const defaultVol = p.volumes[0];
    const stockBadge = getStockBadge(defaultVol.stockStatus);
    const newBadge = p.status === 'New' ? '<span class="badge badge-new">New</span>' : '';
    const imgSrc = p.image ? `../catalog/images/${p.image}` : null;

    return `
      <div class="product-card" onclick="openDetail('${p.id}')">
        <div class="product-img-wrap">
          <div class="badge-wrap">${newBadge}${stockBadge}</div>
          ${imgSrc
            ? `<img class="product-img" src="${imgSrc}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-img-placeholder\\'>${getBottleSVG()}</div>'">`
            : `<div class="product-img-placeholder">${getBottleSVG()}</div>`
          }
        </div>
        <div class="product-info">
          <div class="product-type">${p.type === 'Inspired' ? 'Inspired by' : 'Suvanna'}</div>
          <div class="product-brand">${p.brand}</div>
          <div class="product-name">${p.name}</div>
          ${p.notes ? `<div class="product-notes">${p.notes}</div>` : ''}
          <div class="product-volume">${p.volumes.map(v => v.volume).join(' · ')}</div>
          <div class="product-price">${Number(defaultVol.price).toLocaleString()} Ks</div>
          ${defaultVol.sold > 0 ? `<div class="product-sold">${defaultVol.sold} sold</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let filtered = allProducts;
  if (filter === 'men') filtered = allProducts.filter(p => p.category === 'Men');
  else if (filter === 'women') filtered = allProducts.filter(p => p.category === 'Women');
  else if (filter === 'unisex') filtered = allProducts.filter(p => p.category === 'Unisex');
  else if (filter === 'new') filtered = allProducts.filter(p => p.status === 'New');
  else if (filter === 'featured') filtered = allProducts.filter(p => p.featured === 'Yes');
  else if (filter === 'inspired') filtered = allProducts.filter(p => p.type === 'Inspired');
  else if (filter === 'suvanna') filtered = allProducts.filter(p => p.type === 'Suvanna');

  renderGrid(filtered);
}

function openDetail(id) {
  const grouped = groupByID(allProducts);
  const p = grouped.find(x => x.id === id);
  if (!p) return;

  selectedVolumes[id] = 0;
  renderDetail(p);
  document.getElementById('detailPage').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderDetail(p) {
  const volIdx = selectedVolumes[p.id] || 0;
  const vol = p.volumes[volIdx];
  const imgSrc = p.image ? `../catalog/images/${p.image}` : null;
  const isOutOfStock = vol.stockStatus === 'Out of Stock';

  const stockClass = vol.stockStatus === 'Out of Stock' ? 'detail-stock-out'
    : vol.stockStatus === 'Low Stock' ? 'detail-stock-low'
    : 'detail-stock-instock';

  const desc = p.description || '';
  const shortDesc = desc.length > 120 ? desc.substring(0, 120) + '...' : desc;
  const hasMore = desc.length > 120;

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-img-wrap">
      ${imgSrc
        ? `<img class="detail-img" src="${imgSrc}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'detail-img-placeholder\\'>${getBottleSVG()}</div>'">`
        : `<div class="detail-img-placeholder">${getBottleSVG()}</div>`
      }
    </div>
    <div class="detail-info">
      <div class="detail-badges">
        ${p.status === 'New' ? '<span class="badge badge-new">New</span>' : ''}
        ${getStockBadge(vol.stockStatus)}
      </div>
      <div class="detail-type">${p.type === 'Inspired' ? 'Inspired by' : 'Suvanna Original'}</div>
      <div class="detail-brand">${p.brand}</div>
      <div class="detail-name">${p.name}</div>

      ${p.notes ? `
        <div class="detail-section-label">Scent Notes</div>
        <div class="detail-notes">${p.notes}</div>
      ` : ''}

      ${p.volumes.length > 1 ? `
        <div class="detail-section-label">Volume</div>
        <div class="volume-row">
          ${p.volumes.map((v, i) => `
            <button class="vol-btn ${i === volIdx ? 'active' : ''}"
              onclick="selectVolume('${p.id}', ${i})">
              ${v.volume}
            </button>
          `).join('')}
        </div>
      ` : `<div style="font-size:0.8rem;color:#bbb;margin-bottom:16px;">${vol.volume}</div>`}

      <div class="detail-price">${Number(vol.price).toLocaleString()} Ks</div>
      ${vol.sold > 0 ? `<div class="detail-sold">${vol.sold} sold</div>` : ''}
      <div class="detail-stock-status ${stockClass}">${vol.stockStatus}</div>

      ${desc ? `
        <div class="detail-section-label">Description</div>
        <div class="detail-desc" id="detailDesc">${shortDesc}</div>
        ${hasMore ? `<button class="read-more-btn" id="readMoreBtn" onclick="toggleReadMore('${p.id}')">Read more</button>` : ''}
      ` : ''}

      ${!isOutOfStock ? `
        <button class="add-to-bag-btn">Add to Bag</button>
      ` : ''}
    </div>
  `;

  window._currentDetailProduct = p;
  window._fullDesc = desc;
  window._shortDesc = shortDesc;
  window._descExpanded = false;
}

function selectVolume(id, idx) {
  selectedVolumes[id] = idx;
  const grouped = groupByID(allProducts);
  const p = grouped.find(x => x.id === id);
  if (p) renderDetail(p);
}

function toggleReadMore(id) {
  const descEl = document.getElementById('detailDesc');
  const btn = document.getElementById('readMoreBtn');
  if (!window._descExpanded) {
    descEl.textContent = window._fullDesc;
    btn.textContent = 'Read less';
    window._descExpanded = true;
  } else {
    descEl.textContent = window._shortDesc;
    btn.textContent = 'Read more';
    window._descExpanded = false;
  }
}

function closeDetail() {
  document.getElementById('detailPage').classList.remove('open');
  document.body.style.overflow = '';
}

async function loadProducts() {
  try {
    const res = await fetch(SHEET_URL);
    const data = await res.json();
    if (data.success && data.products) {
      allProducts = data.products;
      renderGrid(allProducts);
    }
  } catch (err) {
    document.getElementById('catalogGrid').innerHTML =
      '<div class="loading" style="grid-column:1/-1;">ချိတ်ဆက်မရပါ၊ ထပ်ကြိုးစားပါ</div>';
  }
}

function toggleMenu() {
  document.getElementById('burgerBtn').classList.toggle('open');
  document.getElementById('dropdownMenu').classList.toggle('open');
