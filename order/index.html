<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order — Suvanna Rangoon</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Open Sans', sans-serif; background: #fff; color: #222; overflow-x: hidden; }

  nav {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    height: 52px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .nav-inner { width: 100%; max-width: 900px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 100%; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-icon-btn { background: none; border: none; cursor: pointer; color: #333; display: flex; align-items: center; padding: 4px; position: relative; }
  .cart-badge { position: absolute; top: -4px; right: -4px; background: #111; color: #fff; width: 15px; height: 15px; border-radius: 50%; font-size: 0.55rem; display: none; align-items: center; justify-content: center; font-weight: 700; }
  .cart-badge.show { display: flex; }
  .burger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .burger span { display: block; width: 20px; height: 1.5px; background: #333; transition: all 0.3s ease; transform-origin: center; }
  .burger.open span:nth-child(1) { transform: translateY(3.25px) rotate(45deg); }
  .burger.open span:nth-child(2) { transform: translateY(-3.25px) rotate(-45deg); }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Open Sans', sans-serif; font-size: 0.75rem; color: #555; padding: 0; }
  .back-btn:hover { color: #111; }

  .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .menu-overlay.open { opacity: 1; pointer-events: all; }
  .dropdown-menu { position: fixed; top: 0; right: 0; bottom: 0; width: 260px; background: #fff; z-index: 95; padding: 72px 28px 32px; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; overflow-y: auto; }
  .dropdown-menu.open { transform: translateX(0); }
  .menu-item { display: block; padding: 13px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #222; cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; text-align: left; width: 100%; font-family: 'Open Sans', sans-serif; transition: color 0.2s; }
  .menu-item:hover { color: #888; }

  /* PAGE */
  .page-wrap { margin-top: 52px; min-height: calc(100vh - 52px); display: flex; flex-direction: column; }
  .hero-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px 32px; max-width: 480px; margin: 0 auto; width: 100%; }

  /* BAG + BOTTLE ANIMATION */
  .bag-anim-wrap { position: relative; width: 72px; height: 80px; margin-bottom: 28px; }

  /* bottle slide in from right */
  @keyframes b30in {
    0%   { transform: translateX(48px); opacity: 0; }
    18%  { transform: translateX(0px); opacity: 1; }
    45%  { transform: translateX(0px); opacity: 1; }
    58%  { transform: translateX(0px) translateY(16px); opacity: 0; }
    100% { transform: translateX(0px) translateY(16px); opacity: 0; }
  }
  @keyframes b10in {
    0%   { transform: translateX(48px); opacity: 0; }
    18%  { transform: translateX(0px); opacity: 1; }
    45%  { transform: translateX(0px); opacity: 1; }
    58%  { transform: translateX(0px) translateY(16px); opacity: 0; }
    100% { transform: translateX(0px) translateY(16px); opacity: 0; }
  }

  .bottle-30 {
    position: absolute;
    top: -4px; left: 50%;
    margin-left: -18px;
    opacity: 0;
    animation: b30in 4s ease-in-out infinite;
    animation-delay: 0s;
    z-index: 2;
  }
  .bottle-10 {
    position: absolute;
    top: 0px; left: 50%;
    margin-left: -14px;
    opacity: 0;
    animation: b10in 4s ease-in-out infinite;
    animation-delay: 2s;
    z-index: 2;
  }

  /* bag tilt — triggered after bottle enters */
  @keyframes bagRock {
    0%   { transform: rotate(0deg); }
    12%  { transform: rotate(-8deg); }
    24%  { transform: rotate(6deg); }
    36%  { transform: rotate(-4deg); }
    48%  { transform: rotate(2deg); }
    60%  { transform: rotate(-1deg); }
    72%  { transform: rotate(0deg); }
    100% { transform: rotate(0deg); }
  }

  .bag-svg {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    transform-origin: bottom center;
    z-index: 1;
  }

  /* bag rocks after 30ml enters (~0.7s) then after 10ml enters (~2.7s) */
  .bag-svg svg {
    animation: bagRock 4s ease-in-out infinite;
    animation-delay: 0.7s;
    transform-origin: bottom center;
    display: block;
  }

  /* heading */
  .order-heading { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: #bbb; margin-bottom: 8px; text-align: center; }
  .order-title { font-size: 1.3rem; font-weight: 700; color: #111; margin-bottom: 28px; text-align: center; }

  /* search */
  .search-wrap { width: 100%; }
  .search-box { display: flex; align-items: center; gap: 8px; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 10px 14px; background: #fff; margin-bottom: 10px; transition: border-color 0.2s; }
  .search-box:focus-within { border-color: #111; }
  .search-box svg { color: #bbb; flex-shrink: 0; }
  .search-input { flex: 1; border: none; outline: none; font-family: 'Open Sans', sans-serif; font-size: 0.85rem; color: #222; background: transparent; }
  .search-input::placeholder { color: #ccc; }
  .search-btn { width: 100%; background: #111; color: #fff; border: none; padding: 13px; font-family: 'Open Sans', sans-serif; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
  .search-btn:hover { background: #333; }

  .result-wrap { margin-top: 20px; width: 100%; }

  footer { background: #000; padding: 40px 0 32px; }
  .footer-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  .footer-brand { font-size: 1.3rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; text-align: center; margin-bottom: 36px; }
  .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 36px; }
  @media (min-width: 600px) { .footer-grid { grid-template-columns: repeat(4, 1fr); } }
  .footer-col-title { font-size: 0.65rem; font-weight: 600; color: #fff; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
  .footer-link { display: block; font-size: 0.8rem; color: #888; text-decoration: none; margin-bottom: 8px; }
  .footer-link:hover { color: #fff; }
  .footer-social { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
  .social-icon { background: none; border: none; cursor: pointer; color: #666; display: flex; align-items: center; transition: color 0.2s; padding: 4px; }
  .social-icon:hover { color: #fff; }
  .footer-bottom { text-align: center; font-size: 0.72rem; color: #555; border-top: 1px solid #222; padding-top: 20px; }
</style>
</head>
<body>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="dropdown-menu" id="dropdownMenu">
  <button class="menu-item" onclick="goTo('../home')">Home</button>
  <button class="menu-item" onclick="goTo('../home')">A Moment</button>
  <button class="menu-item" onclick="goTo('../shop')">Shop</button>
  <button class="menu-item" onclick="goTo('../catalog')">Catalog</button>
  <button class="menu-item" onclick="goTo('../order')">Order</button>
  <button class="menu-item" onclick="goTo('../store')">Store</button>
  <button class="menu-item" onclick="goTo('../about')">About</button>
  <button class="menu-item" onclick="goTo('../contact')">Contact</button>
</div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
      </svg>
      Back
    </button>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="goTo('../catalog')" title="Catalog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z"/>
        </svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="burger" id="burgerBtn" onclick="toggleMenu()">
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</nav>

<!-- PAGE -->
<div class="page-wrap">
  <div class="hero-section">

    <!-- BAG + BOTTLE ANIMATION -->
    <div class="bag-anim-wrap">

      <!-- 30ml bottle — ဝင် ငြိမ် ထွက် loop -->
      <div class="bottle-30">
        <svg width="28" height="48" viewBox="0 0 48 82" fill="none">
          <rect x="15" y="2" width="18" height="24" rx="4" stroke="#111" stroke-width="1.4" fill="none"/>
          <rect x="3" y="30" width="42" height="48" rx="4" stroke="#111" stroke-width="1.4" fill="none"/>
        </svg>
      </div>

      <!-- 10ml bottle — delay 2s -->
      <div class="bottle-10">
        <svg width="20" height="52" viewBox="0 0 40 97" fill="none">
          <rect x="11" y="2" width="18" height="24" rx="4" stroke="#111" stroke-width="1.4" fill="none"/>
          <rect x="10" y="30" width="20" height="67" rx="4" stroke="#111" stroke-width="1.4" fill="none"/>
        </svg>
      </div>

      <!-- static bag — rocks after bottle enters -->
      <div class="bag-svg">
        <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="0.8" width="56" height="56">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z"/>
        </svg>
      </div>
    </div>

    <!-- HEADING -->
    <div class="order-heading">Suvanna Rangoon</div>
    <div class="order-title">Order စစ်ဆေးရန်</div>

    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0015.803 15.803z"/>
        </svg>
        <input class="search-input" type="text" id="orderInput" placeholder="Order ID ရိုက်ထည့်ပါ...">
      </div>
      <button class="search-btn" onclick="searchOrder()">Order စစ်ဆေးမည်</button>
    </div>

    <div class="result-wrap" id="resultWrap"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">Suvanna</div>
    <div class="footer-grid">
      <div>
        <div class="footer-col-title">Products</div>
        <a class="footer-link" href="../catalog">Catalog</a>
        <a class="footer-link" href="../shop">Shop</a>
      </div>
      <div>
        <div class="footer-col-title">Suvanna Store</div>
        <a class="footer-link" href="../store">Find a Store</a>
        <a class="footer-link" href="../shop">Online Store</a>
      </div>
      <div>
        <div class="footer-col-title">Customer Care</div>
        <a class="footer-link" href="../order">Order Status</a>
        <a class="footer-link" href="#">Returns</a>
        <a class="footer-link" href="../contact">Contact Us</a>
      </div>
      <div>
        <div class="footer-col-title">About Suvanna</div>
        <a class="footer-link" href="../about">About Us</a>
        <a class="footer-link" href="#">Career Opportunities</a>
      </div>
    </div>
    <div class="footer-social">
      <button class="social-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></button>
      <button class="social-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg></button>
      <button class="social-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.17 8.17 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg></button>
    </div>
    <div class="footer-bottom">© 2026 Suvanna Rangoon. All rights reserved.</div>
  </div>
</footer>

<script>
function goTo(u){window.location.href=u;}
function toggleMenu(){
  document.getElementById('burgerBtn').classList.toggle('open');
  document.getElementById('dropdownMenu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
}

function getCart(){try{return JSON.parse(localStorage.getItem('suvanna_cart')||'[]');}catch{return[];}}
function updateCartBadge(){
  const t=getCart().reduce(function(s,i){return s+i.qty;},0);
  const b=document.getElementById('cartBadge');
  if(t>0){b.textContent=t;b.classList.add('show');}else{b.classList.remove('show');}
}

function searchOrder(){
  const val=document.getElementById('orderInput').value.trim();
  const wrap=document.getElementById('resultWrap');
  if(!val){
    wrap.innerHTML='<p style="text-align:center;font-size:0.82rem;color:#bbb;margin-top:12px;">Order ID ထည့်ပါ</p>';
    return;
  }
  wrap.innerHTML='<p style="text-align:center;font-size:0.82rem;color:#bbb;margin-top:16px;">ရှာဖွေနေသည်...</p>';
}

document.getElementById('orderInput').addEventListener('keydown',function(e){
  if(e.key==='Enter') searchOrder();
});

/* BAG SEQUENCE ANIMATION via JS */
const bagEl = document.querySelector('.bag-svg svg');
const CYCLE = 4000; // 4s total cycle

function runBagRock(delayMs) {
  setTimeout(function() {
    bagEl.style.animation = 'none';
    bagEl.offsetHeight; // reflow
    bagEl.style.animation = 'bagRock 1.2s ease-in-out forwards';
  }, delayMs);
}

function startSequence() {
  // 30ml enters at 0 → bag rocks at 700ms
  runBagRock(700);
  // 10ml enters at 2000ms → bag rocks at 2700ms
  runBagRock(2700);
}

// inject bagRock keyframe dynamically
var style = document.createElement('style');
style.textContent = '@keyframes bagRock { 0%,100%{transform:rotate(0deg)}12%{transform:rotate(-8deg)}24%{transform:rotate(6deg)}36%{transform:rotate(-4deg)}48%{transform:rotate(2deg)}60%{transform:rotate(-1deg)}72%{transform:rotate(0deg)} }';
document.head.appendChild(style);

bagEl.style.transformOrigin = 'bottom center';
bagEl.style.display = 'block';

// run sequence loop
startSequence();
setInterval(startSequence, CYCLE);

updateCartBadge();
</script>
</body>
</html>
